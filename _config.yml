about_content: | # this will include new lines to allow paragraphs
  Computer Science undergraduate at LUMS with an Economics minor, specializing in data science and machine
  learning. Proven experience building end-to-end AI-driven systems, statistical models, and scalable data applications.
  Interested in applying data-driven solutions to real-world business and financial problems.

content:
  - title: Projects # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: TutorMe – AI-Powered Learning Platform
        caption: September 2025 – Present
        description: |
          An intelligent learning companion built to solve fragmented learning and inefficient live lectures.

          - Built a microservices-based platform using **Node.js/Express**, **Next.js**, deployed on **Vercel** and cloud **Kubernetes (Oracle OKE)** with CI/CD, auto-scaling, and self-healing.
          - Designed & integrated a RAG pipeline with OpenAI GPT to generate contextual **quizzes, flashcards, and podcasts** from multimodal student content.
          - Implemented **Smart Study Planner** with personalized calendar and study roadmaps.
          - Added **Lecture Recording & Transcription** with Urdu transcript support.
          - Integrated **Live Chat & Q&A** during lectures with real-time interaction.
          - Used **MongoDB Atlas** (Database), **Cloudflare R2** (Storage), **Firebase** (Auth & Services), **Redis/Upstash** (Caching & Queuing), **Docker** (Containerization), and **Stripe** for payments.
          - Implemented OAuth 2.0 authentication and AES-256 encryption for secure user access.
      - layout: left
        title: Student Registration System – Relational Database
        caption: September 2025 – December 2025
        description: |
          - Designed and implemented a normalized relational database (3NF) for a university registration system.
          - Enforced referential integrity using primary and foreign keys.
          - Optimized performance on 100,000+ enrollment records using indexing, CTEs, triggers, stored procedures, and partitioning, improving query performance.
      - layout: left
        title: Zanjeer 3D – Unity Platformer Game
        caption: September 2025 – December 2025
        description: |
          - Designed and developed a 3D platformer in Unity (C#).
          - Implemented physics-based cooperative mechanics including spring-joint chain systems, dynamic platform attachments, and persistent checkpoint states.
      - layout: left
        title: Multimodal AI Framework in Healthcare – Research Proposal
        caption: February 2025 – May 2025
        description: |
          - Developed a conceptual multimodal AI framework for early neurodegenerative disease detection using speech and handwriting biomarkers.
          - Designed feature engineering strategy, ensemble modeling approach, and AI integration for clinical screening.
      - layout: left
        title: Factors Influencing Academic Performance in Pakistan
        caption: September 2024 – December 2024
        description: |
          - Built OLS and Random Forest models on 10,000+ records to identify key socioeconomic predictors of student performance.

